<!DOCTYPE html>
<html>

<head>
    <title>Upload Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Upload Document</h1>
    </header>

    <div class="container">

        <div class="card">

            <input type="text" id="title" placeholder="Document Title">

            <input type="text" id="description" placeholder="Description">

            <input type="text" id="project_name" placeholder="Project Name">

            <input type="text" id="tags" placeholder="Tags">

            <select id="category">
                <option>Lessons Learned</option>
                <option>Standard Drawings</option>
                <option>Cost Data</option>
                <option>Site Issues</option>
            </select>

            <input type="file" id="file">

            <button onclick="uploadDocument()">
                Upload
            </button>

            <div id="uploadResult"></div>

        </div>

    </div>

    <script src="app.js"></script>

</body>

</html>
